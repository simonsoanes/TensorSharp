name: Publish NuGet

# Packs the public TensorSharp packages and pushes them to NuGet.org and the
# repository's GitHub Packages feed.
#
# Trigger: push a version tag like `v2.8.6`. The tag (with the leading `v`
# stripped) becomes the package version, overriding the default in
# Directory.Build.props. `workflow_dispatch` is also available for manual /
# dry-run publishes.
#
# Packing is managed-only: the native libraries (GGML/CUDA/MLX) are not embedded
# in the .nupkg, so this job skips the native build (-SkipNativeBuild) and runs
# on a stock GitHub-hosted runner with no GPU/CMake toolchain.
#
# Authentication — nuget.org uses Trusted Publishing (OIDC), so there is no
# long-lived API key to store or rotate. NuGet/login exchanges a GitHub OIDC
# token for an API key valid for 1 hour, which is why that step sits immediately
# before the push rather than at the top of the job.
#
# The nuget.org policy pins all four of these; changing any one here without
# updating the policy at https://www.nuget.org/account/trustedpublishing (and
# vice versa) breaks the token exchange with a 4xx from the token service:
#   - Repository owner : zhongkaifu   (id 3347714)
#   - Repository       : TensorSharp  (id 1200226423)
#   - Workflow file    : publish-nuget.yml   (renaming this file breaks it)
#   - Environment      : production    (the `environment:` key on the job below;
#                        the OIDC token only carries an environment claim when
#                        the job declares one, so removing it breaks the match)
#
# GITHUB_TOKEN (provided automatically) covers the GitHub Packages push and
# needs `packages: write`; `id-token: write` is what lets the job mint the OIDC
# token for nuget.org.
#
# Packages are pushed one at a time rather than by glob so that one rejected
# package id (e.g. an id owned by someone else on nuget.org, which returns 403
# and is NOT covered by --skip-duplicate) does not hide the fate of the others.

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish (e.g. 2.8.6). Required when not run from a tag."
        required: false
        default: ""
      dry_run:
        description: "Pack and verify only; do not push to any feed."
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  packages: write
  # Required for Trusted Publishing: lets the job request a GitHub OIDC token
  # to exchange for a short-lived nuget.org API key.
  id-token: write

concurrency:
  # Never cancel an in-flight publish — a half-pushed release is worse than a queue.
  group: publish-nuget-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    name: Pack & publish
    runs-on: ubuntu-latest
    # Must stay in sync with the Environment field of the nuget.org trusted
    # publishing policy — this is what puts the `environment` claim in the OIDC
    # token that the policy matches on.
    environment: production
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with:
          # Native libraries are not packed, so the ggml sources are not needed.
          submodules: false

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Resolve package version
        id: ver
        shell: bash
        run: |
          set -euo pipefail
          V="${{ github.event.inputs.version }}"
          if [ -z "$V" ] && [ "${{ github.ref_type }}" = "tag" ]; then
            V="${GITHUB_REF_NAME#v}"
          fi
          if [ -z "$V" ]; then
            echo "::error::No version resolved. Push a tag like v2.8.6 or supply the 'version' input." >&2
            exit 1
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Resolved package version: $V"

      - name: Pack & verify packages
        shell: pwsh
        run: >-
          ./eng/verify-packages.ps1
          -PackageVersion '${{ steps.ver.outputs.version }}'
          -SkipNativeBuild
          -OutputDirectory artifacts/packages

      - name: Upload package artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.ver.outputs.version }}
          path: |
            artifacts/packages/*.nupkg
            artifacts/packages/*.snupkg
          retention-days: 30

      # Trusted Publishing: exchanges this job's OIDC token for an API key that
      # expires in 1 hour. Runs before any push so that a policy mismatch fails
      # the release before a single package ships to either feed, rather than
      # leaving GitHub Packages updated and nuget.org untouched. A failure here
      # means the OIDC claims did not match the nuget.org policy
      # (owner / repo / workflow file name / environment).
      - name: NuGet login (OIDC)
        id: login
        if: ${{ !inputs.dry_run }}
        uses: NuGet/login@v1
        with:
          user: monkeyfu

      - name: Push to GitHub Packages
        if: ${{ !inputs.dry_run }}
        shell: bash
        run: |
          set -euo pipefail
          # GitHub Packages does not accept symbol packages, so only *.nupkg here.
          for pkg in artifacts/packages/*.nupkg; do
            echo "::group::$(basename "$pkg")"
            dotnet nuget push "$pkg" \
              --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" \
              --api-key "${{ secrets.GITHUB_TOKEN }}" \
              --skip-duplicate
            echo "::endgroup::"
          done

      - name: Push to NuGet.org
        if: ${{ !inputs.dry_run }}
        env:
          NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
        shell: bash
        run: |
          set -uo pipefail
          failed=()
          # Symbol packages follow their .nupkg; both use --skip-duplicate so a
          # re-run over an already-published version is a no-op rather than an error.
          for pkg in artifacts/packages/*.nupkg artifacts/packages/*.snupkg; do
            [ -e "$pkg" ] || continue
            echo "::group::$(basename "$pkg")"
            if ! dotnet nuget push "$pkg" \
              --source "https://api.nuget.org/v3/index.json" \
              --api-key "$NUGET_API_KEY" \
              --skip-duplicate; then
              failed+=("$(basename "$pkg")")
              echo "::error::Failed to push $(basename "$pkg") to nuget.org."
            fi
            echo "::endgroup::"
          done

          if [ ${#failed[@]} -gt 0 ]; then
            echo "::error::${#failed[@]} package(s) were rejected by nuget.org: ${failed[*]}" >&2
            echo "A 403 here usually means the package id is registered to a different nuget.org account." >&2
            exit 1
          fi
          echo "All packages published to nuget.org."
